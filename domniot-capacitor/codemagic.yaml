workflows:
  android-release:
    name: Domniot Android APK
    max_build_duration: 60
    environment:
      node: 22.12.0
      java: 17
      vars:
        PACKAGE_NAME: "com.domniot.app"
        # Aşağıdaki değerleri Codemagic Environment Variables panelinden ekle:
        # GEMINI_API_KEY: Gemini API anahtarın
        # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD (imzalama için)
    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Build web assets
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          npm run build

      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set permissions in AndroidManifest.xml
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # INTERNET permission zaten var, cleartext ekle
          if ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
          fi

      - name: Build debug APK
        script: |
          cd android
          ./gradlew assembleDebug

      # İmzalı release APK için (opsiyonel, önce debug ile test et):
      # - name: Build release APK
      #   script: |
      #     cd android
      #     echo $CM_KEYSTORE | base64 --decode > keystore.jks
      #     ./gradlew assembleRelease \
      #       -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
      #       -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
      #       -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
      #       -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
      # - android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com   # <-- kendi mailin
        notify:
          success: true
          failure: true
